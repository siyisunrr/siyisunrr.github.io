{{- $original := resources.Get "images/homepage_pic.jpg" -}}
{{- if $original -}}
  {{- $favicon32 := $original.Fill "32x32 Center" -}}
  {{- $favicon16 := $original.Fill "16x16 Center" -}}
  {{- $apple := $original.Fill "180x180 Center" -}}
  <link rel="icon" type="image/jpeg" sizes="32x32" href="{{ $favicon32.RelPermalink }}">
  <link rel="icon" type="image/jpeg" sizes="16x16" href="{{ $favicon16.RelPermalink }}">
  <link rel="apple-touch-icon" href="{{ $apple.RelPermalink }}">
{{- end -}}
