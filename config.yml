    title: "Siyi Sun 孙思毅"
    subtitle: >
      I am an incoming M.S. student in New Energy Technology at
      <img src="/images/logos/thu.png" class="inline-logo"> **[Tsinghua University](https://www.tsinghua.edu.cn/)**.
      I will receive my B.Eng. in Materials Science in July 2026 from
      <img src="/images/logos/njupt.png" class="inline-logo"> **[Nanjing University of Posts and Telecommunications (NJUPT)](https://www.njupt.edu.cn/)**.<br><br>
      At NJUPT, I worked on high-Q and high-CD optical metasurfaces in the Optoelectronic Devices Group.
      I was also a visiting student at
      <img src="/images/logos/westlake.png" class="inline-logo"> **[Westlake University](https://www.westlake.edu.cn/)**,
      where I worked with Prof. [Siying Peng](https://pengsy.lab.westlake.edu.cn/) in the
      **[Nanophotonics Materials Lab](https://pengsy.lab.westlake.edu.cn/)**
      on neuromorphic computing for memristors and phase segregation in mixed-halide perovskites.
      In the summer of 2025, I attended a summer school at
      <img src="/images/logos/manchester.png" class="inline-logo"> **[The University of Manchester](https://www.manchester.ac.uk/)**,
      where I studied Nobel Prize physics experiments on holography and optical tweezers with Prof. Mark Dickinson.<br><br>
      *Research Interests:* Optoelectronic Materials, NanoPhotonics & Chip Packaging<br><br>
      <img src="/images/logos/gmail.png" class="inline-logo"> [noahsun119@gmail.com](mailto:noahsun119@gmail.com) / [Blog](/posts/)
